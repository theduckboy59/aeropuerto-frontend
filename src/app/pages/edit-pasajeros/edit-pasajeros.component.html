<div class="page-root">
  <main class="content">
    <header class="topbar">
      <div class="topbar-left">
        <div class="badge">PX</div>

        <div>
          <h1 class="title">Editar pasajero</h1>
          <p class="subtitle">
            Actualiza datos personales del pasajero. No se cambia contrasena desde esta pantalla.
          </p>
        </div>
      </div>

      <button class="btn-secondary" type="button" (click)="regresar()">
        Regresar
      </button>
    </header>

    <div class="alert-danger" *ngIf="error">{{ error }}</div>
    <p class="muted" *ngIf="cargando">Cargando pasajero...</p>

    <section class="card" *ngIf="!cargando">
      <h2 class="section-title">Datos de cuenta</h2>

      <div class="form-grid">
        <div class="field">
          <label class="label">Usuario</label>
          <input class="control" [(ngModel)]="form.username" name="username" />
        </div>

        <div class="field">
          <label class="label">Correo</label>
          <input class="control" type="email" [(ngModel)]="form.email" name="email" />
        </div>
      </div>
    </section>

    <section class="card" *ngIf="!cargando">
      <h2 class="section-title">Datos personales</h2>

      <div class="form-grid">
        <div class="field">
          <label class="label">Pasaporte</label>
          <input class="control" [(ngModel)]="form.pasaporte" name="pasaporte" />
        </div>

        <div class="field field--wide">
          <label class="label">Nombre completo</label>
          <input class="control" [(ngModel)]="form.nombreCompleto" name="nombreCompleto" />
        </div>

        <div class="field">
          <label class="label">Fecha nacimiento</label>
          <input class="control" type="date" [(ngModel)]="form.fechaNacimiento" name="fechaNacimiento" allowPastDate />
        </div>

        <div class="field">
          <label class="label">Nacionalidad</label>
          <input class="control" [(ngModel)]="form.nacionalidad" name="nacionalidad" />
        </div>

        <div class="field">
          <label class="label">Codigo area</label>
          <input class="control" [(ngModel)]="form.codigoArea" name="codigoArea" />
        </div>

        <div class="field">
          <label class="label">Telefono</label>
          <input class="control" [(ngModel)]="form.telefono" name="telefono" />
        </div>

        <div class="field">
          <label class="label">Telefono emergencia</label>
          <input class="control" [(ngModel)]="form.telefonoEmergencia" name="telefonoEmergencia" />
        </div>

        <div class="field field--wide">
          <label class="label">Direccion</label>
          <input class="control" [(ngModel)]="form.direccion" name="direccion" />
        </div>
      </div>

      <div class="form-actions">
        <button
          class="btn-primary"
          type="button"
          [disabled]="guardando"
          (click)="guardar()">
          {{ guardando ? 'Guardando...' : 'Guardar cambios' }}
        </button>

        <button class="btn-secondary" type="button" (click)="regresar()">
          Cancelar
        </button>
      </div>
    </section>
  </main>
</div>
