<div class="shell">
  <header class="topbar" role="banner">
    <button class="icon-btn" type="button" (click)="toggleSidebar()" aria-label="Mostrar/ocultar sidebar">
      ☰
    </button>
    <div class="topbar-title">
      <div class="topbar-app">Aeropuerto Los Primos</div>
      <div class="topbar-sub">Menu de abordaje</div>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar" [class.closed]="!sidebarOpen" aria-label="Sidebar">
      <div class="logo">
        <div class="logo-badge">A B</div>
        <div class="logo-text">
          <div class="logo-title">ABORDAJE</div>
          <div class="logo-sub">Operación</div>
        </div>
      </div>

      <nav class="nav" aria-label="Módulos">
        <a class="nav-item" routerLink="/abordaje" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
        <a class="nav-item" routerLink="/abordaje/vuelos/abordaje" routerLinkActive="active">Abordaje</a>
        <a class="nav-item" routerLink="/abordaje/dashboard/pasajeros" routerLinkActive="active">Pasajeros</a>
      </nav>

      <div class="sidebar-footer">
        <div class="divider"></div>
        <button class="logout" type="button" (click)="logout()">Cerrar sesión</button>
      </div>
    </aside>

    <main class="content" role="main">
      <section class="diagnostic" *ngIf="diagnosticMessage || sessionInfo">
        <div class="diagnostic-title">Diagnostico de carga</div>
        <div class="diagnostic-message" *ngIf="diagnosticMessage">{{ diagnosticMessage }}</div>
        <div class="diagnostic-session">{{ sessionInfo }}</div>
      </section>

      <router-outlet></router-outlet>
    </main>
  </div>
</div>
