<div class="ig-root">
  <nav class="ig-top" aria-label="Navegación">
    <a class="ig-top-link" routerLink="/portal">Volver al portal</a>
  </nav>

  <main class="ig-wrap" aria-label="Inicio de sesión">
    <section class="ig-auth" aria-label="Acceso">
      <div class="ig-cards" aria-label="Panel de acceso">
        <div class="ig-card ig-card--main" aria-labelledby="login-title">
          <div class="brand">
            <div class="brand-badge" aria-label="Código del aeropuerto">ALP</div>
            <h1 class="brand-title">Aeropuerto Los Primos</h1>
            <p class="brand-subtitle">Acceso al panel operativo</p>
          </div>

          <h2 id="login-title" class="ig-title">Iniciar sesión</h2>

          <form class="ig-form" (submit)="$event.preventDefault(); login()">
            <label class="ig-field">
              <span class="ig-label">Usuario o correo</span>
              <input
                class="ig-input"
                [(ngModel)]="email"
                name="email"
                autocomplete="username"
                placeholder="usuario@correo.com"
              />
            </label>

            <label class="ig-field">
              <span class="ig-label">Contraseña</span>
              <div class="ig-pass">
                <input
                  class="ig-input ig-input--pass"
                  [(ngModel)]="password"
                  name="password"
                  [type]="show ? 'text' : 'password'"
                  autocomplete="current-password"
                  placeholder="Tu contraseña"
                />
                <button class="ig-pass-toggle" type="button" (click)="togglePassword()">
                  {{ show ? 'Ocultar' : 'Ver' }}
                </button>
              </div>
            </label>

            <button class="ig-btn" type="submit" [disabled]="loading">
              {{ loading ? 'Ingresando...' : 'Entrar' }}
            </button>
          </form>
        </div>

        <div class="ig-card ig-card--alt" aria-label="Registro">
          <div class="ig-alt-inner">
            <img
              class="brand-logo brand-logo--alt"
              src="/assets/portal/photos/logo-aeropuerto.png"
              alt=""
              aria-hidden="true"
              loading="lazy"
            />
            <p class="ig-alt-text">¿No tienes cuenta?</p>
            <p class="ig-alt-sub">Crea tu usuario para entrar al sistema.</p>
            <a class="ig-alt-link" routerLink="/register">Registrarse</a>
          </div>
        </div>
      </div>

      <p class="ig-meta" aria-label="Nota">
        Al ingresar aceptas las políticas internas de uso del sistema.
      </p>
    </section>
  </main>
</div>
