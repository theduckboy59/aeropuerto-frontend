<div class="page-root">
  <main class="content">

    <header class="topbar" aria-label="Encabezado">
      <div class="topbar-left">
        <div class="badge">A L P</div>

        <div>
          <h1 class="title">Editar vuelo operado</h1>
          <p class="subtitle">
            Edita datos si está PROGRAMADO o CANCELADO. Cambia estado según flujo permitido.
          </p>
        </div>
      </div>

      <div class="topbar-right">
        <button class="btn-secondary" type="button" (click)="regresar()">
          Regresar
        </button>
      </div>
    </header>

    <section class="card" *ngIf="cargando">
      <p class="muted">Cargando...</p>
    </section>

    <section class="card" *ngIf="!cargando && vueloOperado">
      <h2 class="section-title">Detalle actual</h2>

      <div class="form-grid">
        <div class="field">
          <label class="label">Código vuelo</label>
          <input class="control" [value]="vueloOperado.codigoVuelo || ''" disabled />
        </div>

        <div class="field">
          <label class="label">Aerolínea</label>
          <input class="control" [value]="vueloOperado.aerolineaNombre || ''" disabled />
        </div>

        <div class="field">
          <label class="label">Estado actual</label>
          <input class="control" [value]="vueloOperado.estadoVueloNombre || ''" disabled />
        </div>

        <div class="field">
          <label class="label">Tipo actual</label>
          <input class="control" [value]="vueloOperado.tipoSegmentoVueloNombre || ''" disabled />
        </div>

        <div class="field">
          <label class="label">Tramo actual</label>
          <input
            class="control"
            [value]="(vueloOperado.tramoActual || 1) + ' / ' + (vueloOperado.cantidadTramos || 1)"
            disabled
          />
        </div>

        <div class="field">
          <label class="label">Tuvo escala</label>
          <input class="control" [value]="vueloOperado.tuvoEscala ? 'Sí' : 'No'" disabled />
        </div>
      </div>
    </section>

    <section class="card" *ngIf="!cargando && vueloOperado">
      <h2 class="section-title">Editar datos</h2>

      <p class="muted" *ngIf="!puedeEditarDatos()">
        Solo se puede editar avión, tripulación, vuelo programado y tipo cuando está PROGRAMADO o CANCELADO.
      </p>

      <div class="form-grid">
        <div class="field field-wide">
          <label class="label">Vuelo programado</label>

          <select
            class="control"
            [(ngModel)]="form.vueloProgramadoId"
            name="vueloProgramadoId"
            [disabled]="!puedeEditarDatos()">

            <option value="">Seleccione vuelo programado</option>

            <option
              *ngFor="let vuelo of vuelosProgramados"
              [value]="vuelo.vueloProgramadoId">

              {{ getVueloLabel(vuelo) }}
            </option>
          </select>
        </div>

        <div class="field">
          <label class="label">Tipo de vuelo</label>

          <select
            class="control"
            [(ngModel)]="form.tipoSegmentoVueloId"
            name="tipoSegmentoVueloId"
            (change)="onTipoSegmentoChange()"
            [disabled]="!puedeEditarDatos()">

            <option value="">Seleccione tipo</option>

            <option
              *ngFor="let tipo of tiposSegmentoVuelo"
              [value]="tipo.id">

              {{ getTipoLabel(tipo) }}
            </option>
          </select>
        </div>

        <div class="field">
          <label class="label">Cantidad de tramos</label>

          <select
            class="control"
            [(ngModel)]="form.cantidadTramos"
            name="cantidadTramos"
            [disabled]="!puedeEditarDatos() || esDirecto()">

            <option value="1">1 tramo</option>
            <option value="2" *ngIf="!esDirecto()">2 tramos</option>
            <option value="3" *ngIf="!esDirecto()">3 tramos</option>
          </select>
        </div>

        <div class="field">
          <label class="label">Avión</label>

          <select
            class="control"
            [(ngModel)]="form.avionId"
            name="avionId"
            [disabled]="!puedeEditarDatos()">

            <option value="">Seleccione avión</option>

            <option
              *ngFor="let avion of avionesDisponibles"
              [value]="avion.id">

              {{ getAvionLabel(avion) }}
            </option>
          </select>
        </div>

        <div class="field">
          <label class="label">Tripulación</label>

          <select
            class="control"
            [(ngModel)]="form.tripulacionId"
            name="tripulacionId"
            [disabled]="!puedeEditarDatos()">

            <option value="">Seleccione tripulación</option>

            <option
              *ngFor="let tripulacion of tripulacionesDisponibles"
              [value]="tripulacion.id">

              {{ getTripulacionLabel(tripulacion) }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button
          class="btn-primary"
          type="button"
          (click)="guardarDatos()"
          [disabled]="guardandoDatos || cargando || !puedeEditarDatos()">

          {{ guardandoDatos ? 'Guardando...' : 'Guardar datos' }}
        </button>
      </div>
    </section>

    <section class="card" *ngIf="!cargando && vueloOperado">
      <h2 class="section-title">Cambiar estado</h2>

      <div class="form-grid">
        <div class="field">
          <label class="label">Nuevo estado permitido</label>

          <select
            class="control"
            [(ngModel)]="form.estadoVueloId"
            name="estadoVueloId"
            [disabled]="estaCerrado()">

            <option value="">Seleccione estado</option>

            <option
              *ngFor="let estado of getEstadosPermitidos()"
              [value]="estado.id">

              {{ estado.nombre }}
            </option>
          </select>
        </div>

        <div class="field">
          <label class="label">Salida real</label>
          <input
            class="control"
            [value]="(vueloOperado.fechaSalidaReal || '') + ' ' + (vueloOperado.horaSalidaReal || '')"
            disabled
          />
        </div>

        <div class="field">
          <label class="label">Llegada real</label>
          <input
            class="control"
            [value]="(vueloOperado.fechaLlegadaReal || '') + ' ' + (vueloOperado.horaLlegadaReal || '')"
            disabled
          />
        </div>
      </div>

      <div class="form-actions">
        <button
          class="btn-primary"
          type="button"
          (click)="guardarEstado()"
          [disabled]="guardandoEstado || cargando || estaCerrado()">

          {{ guardandoEstado ? 'Guardando...' : 'Guardar estado' }}
        </button>

        <button class="btn-secondary" type="button" (click)="regresar()">
          Cancelar
        </button>
      </div>
    </section>

  </main>
</div>
