<div class="page-root">
  <main class="content">
    <header class="topbar" aria-label="Encabezado">
      <div class="topbar-left">
        <div class="badge">A L P</div>
        <div>
          <h1 class="title">Nuevo empleado</h1>
          <p class="subtitle">Registro de empleados.</p>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn-secondary" type="button" (click)="regresar()">Regresar</button>
      </div>
    </header>

    <section class="card" aria-label="Formulario de empleados">
      <div class="section">
        <h2 class="section-title">Datos del empleado</h2>

        <div class="form-grid">
          <div class="field">
            <label class="label">Usuario</label>
            <input class="control" [(ngModel)]="form.username" />
          </div>

          <div class="field">
            <label class="label">Email</label>
            <input class="control" [(ngModel)]="form.email" />
          </div>

          <div class="field">
            <label class="label">Password</label>
            <input class="control" type="password" [(ngModel)]="form.password" />
          </div>

          <div class="field field-wide">
            <label class="label">Nombre Completo</label>
            <input class="control" [(ngModel)]="form.nombreCompleto" />
          </div>

          <div class="field">
            <label class="label">Tipo Empleado</label>
            <select class="control" [(ngModel)]="form.tipoEmpleadoId">
              <option value="">Seleccione</option>
              <option *ngFor="let t of tipoEmpleado" [value]="t.id">{{ t.nombre }}</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Aerolínea</label>
            <select class="control" [(ngModel)]="form.aerolineaId">
              <option value="">Seleccione</option>
              <option *ngFor="let a of aerolinea" [value]="a.id">{{ a.nombre }}</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Fecha Ingreso</label>
            <input class="control" type="date" [(ngModel)]="form.fechaIngreso" [min]="fechaMinima" />
          </div>

          <div class="field">
            <label class="label">Fecha Salida <span style="color: #999; font-size: 0.9em;">(Opcional)</span></label>
            <input class="control" type="date" [(ngModel)]="form.fechaSalida" [min]="fechaMinima" />
          </div>

          <div class="field">
            <label class="label">Turno</label>
            <select class="control" [(ngModel)]="form.turnoId">
              <option value="">Seleccione</option>
              <option *ngFor="let t of turno" [value]="t.id">{{ t.nombre }}</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Nivel Acceso</label>
            <select class="control" [(ngModel)]="form.nivelAccesoId">
              <option value="">Seleccione</option>
              <option *ngFor="let n of nivelAcceso" [value]="n.id">{{ n.nombre }}</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Rol</label>
            <select class="control" [(ngModel)]="form.rolId">
              <option value="">Seleccione</option>
              <option *ngFor="let r of rol" [value]="r.id">{{ r.nombre }}</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Área</label>
            <select class="control" [(ngModel)]="form.areaId">
              <option value="">Seleccione</option>
              <option *ngFor="let a of area" [value]="a.id">{{ a.nombre }}</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Licencia <span style="color: #999; font-size: 0.9em;">(Opcional)</span></label>
            <select class="control" [(ngModel)]="form.licenciaId">
              <option value="">Seleccione</option>
              <option *ngFor="let l of licencia" [value]="l.id">{{ l.nombre }}</option>
            </select>
          </div>

          <div class="field">
            <label class="label">Fecha Vencimiento Licencia <span style="color: #999; font-size: 0.9em;">(Opcional)</span></label>
            <input class="control" type="date" [(ngModel)]="form.fechaVencimientoLicencia" [min]="fechaMinima" />
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-primary" type="button" (click)="guardar()">Guardar</button>
          <button class="btn-secondary" type="button" (click)="regresar()">Cancelar</button>
        </div>
      </div>
    </section>
  </main>
</div>
