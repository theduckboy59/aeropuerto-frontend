<div class="page-root">
  <main class="content">
    <header class="topbar" aria-label="Encabezado">
      <div class="topbar-left">
        <div class="badge">A L P</div>

        <div>
          <h1 class="title">Crear aeropuerto</h1>
          <p class="subtitle">
            Registro de aeropuertos y puertas. Los códigos IATA e ICAO serán generados automáticamente por el sistema.
          </p>
        </div>
      </div>

      <div class="topbar-right">
        <button
          class="btn-secondary"
          type="button"
          (click)="regresar()">
          Regresar
        </button>
      </div>
    </header>

    <section class="card" aria-label="Formulario">
      <div class="section">
        <h2 class="section-title">Datos del aeropuerto</h2>

        <div class="form-grid">
          <div class="field field-wide">
            <label class="label">Nombre</label>
            <input
              class="control"
              [(ngModel)]="form.nombre"
              placeholder="Ej: Aeropuerto Internacional La Aurora"
            />
          </div>

          <div class="field">
            <label class="label">País</label>
            <input
              class="control"
              [(ngModel)]="form.pais"
              placeholder="Ej: Guatemala"
            />
          </div>

          <div class="field">
            <label class="label">Ciudad</label>
            <input
              class="control"
              [(ngModel)]="form.ciudad"
              placeholder="Ej: Ciudad de Guatemala"
            />
          </div>
        </div>
      </div>
    </section>

    <section class="card" aria-label="Puertas">
      <div class="section">
        <h2 class="section-title">Puertas de embarque</h2>

        <div class="puertas-add">
          <input
            class="control"
            [(ngModel)]="nuevaPuerta"
            (keyup.enter)="agregarPuerta()"
            placeholder="Ej: A1"
          />

          <button
            class="btn-secondary"
            type="button"
            (click)="agregarPuerta()">
            Agregar puerta
          </button>
        </div>

        <div class="table-wrap" *ngIf="puertas.length">
          <table class="table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Acciones</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let p of puertas; let i = index">
                <td>
                  <input
                    class="control"
                    [(ngModel)]="puertas[i].codigo"
                    placeholder="Código"
                  />
                </td>

                <td class="table-actions">
                  <button
                    class="btn-secondary"
                    type="button"
                    (click)="quitarPuerta(i)">
                    Quitar
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="form-actions">
          <button
            class="btn-primary"
            type="button"
            (click)="guardar()"
            [disabled]="cargando">
            {{ cargando ? 'Guardando...' : 'Crear aeropuerto' }}
          </button>

          <button
            class="btn-secondary"
            type="button"
            (click)="regresar()">
            Cancelar
          </button>
        </div>
      </div>
    </section>
  </main>
</div>
