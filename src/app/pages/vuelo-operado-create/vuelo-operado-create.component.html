<div class="page-root">
  <main class="content">

    <header class="topbar" aria-label="Encabezado">
      <div class="topbar-left">
        <div class="badge">A L P</div>

        <div>
          <h1 class="title">Crear vuelo operado</h1>
          <p class="subtitle">
            Crea la operación real del vuelo usando segmentos, avión y tripulación.
          </p>
        </div>
      </div>

      <div class="topbar-right">
        <button class="btn-secondary" type="button" (click)="regresar()">
          Regresar
        </button>
      </div>
    </header>

    <section class="card" aria-label="Formulario">
      <h2 class="section-title">Datos generales</h2>

      <p class="muted" *ngIf="cargando">Cargando...</p>

      <div class="form-grid">
        <div class="field field-wide">
          <label class="label">Vuelo programado *</label>

          <select
            class="control"
            [(ngModel)]="form.vueloProgramadoId"
            name="vueloProgramadoId"
            (change)="onVueloProgramadoChange()">

            <option value="">Seleccione vuelo programado</option>

            <option
              *ngFor="let vuelo of vuelosProgramadosDisponibles"
              [value]="vuelo.vueloProgramadoId">

              {{ getVueloLabel(vuelo) }}
            </option>
          </select>
        </div>

        <div class="field">
          <label class="label">Tipo de vuelo *</label>

          <select
            class="control"
            [(ngModel)]="form.tipoSegmentoVueloId"
            name="tipoSegmentoVueloId"
            (change)="onTipoSegmentoChange()">

            <option value="">Seleccione tipo</option>

            <option
              *ngFor="let tipo of tiposSegmentoVuelo"
              [value]="tipo.id">

              {{ getTipoLabel(tipo) }}
            </option>
          </select>
        </div>

        <div class="field">
          <label class="label">Cantidad de segmentos *</label>

          <select
            class="control"
            [(ngModel)]="form.cantidadSegmentos"
            name="cantidadSegmentos"
            [disabled]="esDirecto()"
            (change)="onCantidadSegmentosChange()">

            <option value="1">1 segmento</option>
            <option value="2" *ngIf="!esDirecto()">2 segmentos</option>
            <option value="3" *ngIf="!esDirecto()">3 segmentos</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card" aria-label="Segmentos">
      <h2 class="section-title">Segmentos del vuelo</h2>

      <p class="muted" *ngIf="!form.vueloProgramadoId">
        Seleccione un vuelo programado para generar los segmentos.
      </p>

      <div *ngFor="let segmento of segmentos; let i = index" class="card" style="margin-top: 12px;">
        <h3 class="section-title">Segmento {{ segmento.ordenSegmento }}</h3>

        <div class="form-grid">
          <div class="field">
            <label class="label">Aeropuerto salida *</label>
            <select
              class="control"
              [(ngModel)]="segmento.aeropuertoSalidaId"
              [name]="'aeropuertoSalidaId' + i"
              [disabled]="isSalidaFija(i)">

              <option value="">Seleccione</option>
              <option *ngFor="let aeropuerto of aeropuertos" [value]="aeropuerto.id">
                {{ getAeropuertoLabel(aeropuerto) }}
              </option>
            </select>
          </div>

          <div class="field">
            <label class="label">Aeropuerto llegada *</label>
            <select
              class="control"
              [(ngModel)]="segmento.aeropuertoLlegadaId"
              [name]="'aeropuertoLlegadaId' + i"
              [disabled]="isLlegadaFija(i)"
              (change)="onLlegadaSegmentoChange(i)">

              <option value="">Seleccione</option>
              <option *ngFor="let aeropuerto of aeropuertos" [value]="aeropuerto.id">
                {{ getAeropuertoLabel(aeropuerto) }}
              </option>
            </select>
          </div>

          <div class="field">
            <label class="label">Fecha salida *</label>
            <input
              class="control"
              type="date"
              [(ngModel)]="segmento.fechaSalida"
              [name]="'fechaSalida' + i"
            />
          </div>

          <div class="field">
            <label class="label">Hora salida *</label>
            <input
              class="control"
              type="time"
              [(ngModel)]="segmento.horaSalida"
              [name]="'horaSalida' + i"
            />
          </div>

          <div class="field">
            <label class="label">Fecha llegada *</label>
            <input
              class="control"
              type="date"
              [(ngModel)]="segmento.fechaLlegada"
              [name]="'fechaLlegada' + i"
            />
          </div>

          <div class="field">
            <label class="label">Hora llegada *</label>
            <input
              class="control"
              type="time"
              [(ngModel)]="segmento.horaLlegada"
              [name]="'horaLlegada' + i"
            />
          </div>

          <div class="field">
            <label class="label">Avión disponible *</label>
            <select
              class="control"
              [(ngModel)]="segmento.avionId"
              [name]="'avionId' + i"
              [disabled]="!form.vueloProgramadoId || recursoBloqueado(i)"
              (change)="onRecursoBaseChange()">

              <option value="">Seleccione avión</option>
              <option *ngFor="let avion of avionesDisponibles" [value]="avion.id">
                {{ getAvionLabel(avion) }}
              </option>
            </select>
          </div>

          <div class="field">
            <label class="label">Tripulación disponible *</label>
            <select
              class="control"
              [(ngModel)]="segmento.tripulacionId"
              [name]="'tripulacionId' + i"
              [disabled]="!form.vueloProgramadoId || recursoBloqueado(i)"
              (change)="onRecursoBaseChange()">

              <option value="">Seleccione tripulación</option>
              <option *ngFor="let tripulacion of tripulacionesDisponibles" [value]="tripulacion.id">
                {{ getTripulacionLabel(tripulacion) }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button
          class="btn-primary"
          type="button"
          (click)="guardar()"
          [disabled]="guardando || cargando">

          {{ guardando ? 'Guardando...' : 'Crear vuelo operado' }}
        </button>

        <button class="btn-secondary" type="button" (click)="regresar()">
          Cancelar
        </button>
      </div>
    </section>

  </main>
</div>
