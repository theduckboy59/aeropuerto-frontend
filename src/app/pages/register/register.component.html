<div class="page-root">
  <div class="page-layout">

    <div class="brand">
      <div class="brand-badge">AEROPUERTO</div>
      <h1 class="brand-title">Los Primos</h1>
      <p class="brand-subtitle">
        Registro de pasajeros
      </p>
    </div>

    <div class="panel">
      <div class="card">

        <div class="header">
          <h2 class="card-title">Crear cuenta</h2>
          <p class="card-subtitle">Complete la información</p>
        </div>

        <div class="alert-error" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <form class="form">

          <div class="grid">

            <div class="field">
              <label class="label">Usuario</label>
              <input class="control"
                     [(ngModel)]="form.username"
                     name="username"
                     autocomplete="username"
                     placeholder="ej: usuario123">
            </div>

            <div class="field">
              <label class="label">Correo</label>
              <input class="control"
                     type="email"
                     [(ngModel)]="form.email"
                     name="email"
                     autocomplete="email"
                     placeholder="ej: usuario@mail.com">
            </div>

            <div class="field">
              <label class="label">Contraseña</label>

              <div class="password-row">
                <input class="control"
                       [type]="showPassword ? 'text' : 'password'"
                       [(ngModel)]="form.password"
                       name="password"
                       autocomplete="new-password"
                       placeholder="Ej: Abc@$123">

                <button class="btn-eye"
                        type="button"
                        (click)="togglePassword()">
                  {{ showPassword ? 'Ocultar' : 'Ver' }}
                </button>
              </div>

              <small class="hint">
                Mínimo 6 caracteres, una mayúscula, un número y un carácter especial.
              </small>
            </div>

            <div class="field">
              <label class="label">Pasaporte</label>
              <input class="control"
                     [(ngModel)]="form.pasaporte"
                     name="pasaporte"
                     maxlength="15"
                     (keydown)="bloquearPasaporteSiCompleto($event)"
                     (input)="limitarPasaporte()"
                     autocomplete="off"
                     placeholder="ej: GT123456">
            </div>

            <div class="field">
              <label class="label">Nombre Completo</label>
              <input class="control"
                     [(ngModel)]="form.nombreCompleto"
                     name="nombreCompleto"
                     autocomplete="name"
                     placeholder="ej: Juan Pérez">
            </div>

            <div class="field">
              <label class="label">Fecha Nacimiento</label>
              <input type="date"
                     class="control"
                     [(ngModel)]="form.fechaNacimiento"
                     name="fechaNacimiento"
                     allowPastDate>
            </div>

            <div class="field">
              <label class="label">Nacionalidad</label>
              <input class="control"
                     [(ngModel)]="form.nacionalidad"
                     name="nacionalidad"
                     placeholder="ej: GUATEMALA">
            </div>

            <div class="field">
              <label class="label">Código Área</label>
              <input class="control"
                     [(ngModel)]="form.codigoArea"
                     name="codigoArea"
                     maxlength="10"
                     inputmode="numeric"
                     (input)="limitarCodigoArea()"
                     placeholder="ej: 502">
            </div>

            <div class="field">
              <label class="label">Teléfono</label>
              <input class="control"
                     [(ngModel)]="form.telefono"
                     name="telefono"
                     maxlength="8"
                     inputmode="numeric"
                     pattern="[0-9]*"
                     (input)="limitarTelefono()"
                     placeholder="ej: 12345678">
            </div>

            <div class="field">
              <label class="label">Teléfono Emergencia</label>
              <input class="control"
                     [(ngModel)]="form.telefonoEmergencia"
                     name="telefonoEmergencia"
                     maxlength="8"
                     inputmode="numeric"
                     pattern="[0-9]*"
                     (input)="limitarTelefonoEmergencia()"
                     placeholder="ej: 87654321">
            </div>

            <div class="field field-wide">
              <label class="label">Dirección</label>
              <input class="control"
                     [(ngModel)]="form.direccion"
                     name="direccion"
                     autocomplete="street-address"
                     placeholder="ej: Zona 1, Ciudad de Guatemala">
            </div>

          </div>

          <div class="footer">

            <button class="btn-primary"
                    type="button"
                    (click)="register()"
                    [disabled]="loading">
              {{ loading ? 'Registrando...' : 'VALIDAR' }}
            </button>

            <button class="btn-secondary"
                    type="button"
                    (click)="cancelar()"
                    [disabled]="loading">
              Cancelar
            </button>

          </div>

        </form>

      </div>
    </div>

  </div>
</div>
