<div class="page-root">
  <div class="page-layout">

    <div class="brand">
      <div class="brand-badge">AEROPUERTO</div>
      <h1 class="brand-title">Los Primos</h1>
      <p class="brand-subtitle">
        Registro de pasajeros
      </p>
    </div>

    <div class="panel">
      <div class="card">

        <div class="header">
          <h2 class="card-title">Crear cuenta</h2>
          <p class="card-subtitle">Complete la información</p>
        </div>

        <form class="form">

          <div class="grid">

            <div class="field">
              <label class="label">Usuario</label>
              <input class="control"
                     [(ngModel)]="form.username"
                     name="username"
                     placeholder="ej: usuario123">
            </div>

            <div class="field">
              <label class="label">Correo</label>
              <input class="control"
                     [(ngModel)]="form.email"
                     name="email"
                     placeholder="ej: usuario@mail.com">
            </div>

            <div class="field">
              <label class="label">Contraseña</label>
              <div style="display:flex; gap:5px;">
                <input class="control"
                       [type]="showPassword ? 'text' : 'password'"
                       [(ngModel)]="form.password"
                       name="password"
                       placeholder="Ej: Abc@$123">
                <button type="button" (click)="togglePassword()">
                  {{ showPassword ? 'Ocultar' : 'Ver' }}
                </button>
              </div>
            </div>

            <div class="field">
              <label class="label">Pasaporte</label>
              <input class="control"
                     [(ngModel)]="form.pasaporte"
                     name="pasaporte"
                     maxlength="15"
                     (keydown)="bloquearPasaporteSiCompleto($event)"
                     (input)="limitarPasaporte()"
                     inputmode="numeric"
                     autocomplete="off"
                     placeholder="ej: 123456789012345">
            </div>

            <div class="field">
              <label class="label">Nombre Completo</label>
              <input class="control"
                     [(ngModel)]="form.nombreCompleto"
                     name="nombreCompleto"
                     placeholder="ej: Juan Pérez">
            </div>

            <div class="field">
              <label class="label">Fecha Nacimiento</label>
              <input type="date"
                     class="control"
                     [(ngModel)]="form.fechaNacimiento"
                     name="fechaNacimiento">
            </div>

            <div class="field">
              <label class="label">Nacionalidad</label>
              <input class="control"
                     [(ngModel)]="form.nacionalidad"
                     name="nacionalidad"
                     placeholder="ej: GUATEMALA">
            </div>

            <div class="field">
              <label class="label">Código Área</label>
              <input class="control"
                     [(ngModel)]="form.codigoArea"
                     name="codigoArea"
                     placeholder="ej: 502">
            </div>

            <div class="field">
              <label class="label">Teléfono</label>
              <input class="control"
                     [(ngModel)]="form.telefono"
                     name="telefono"
                     placeholder="ej: 12345678">
            </div>

            <div class="field">
              <label class="label">Teléfono Emergencia</label>
              <input class="control"
                     [(ngModel)]="form.telefonoEmergencia"
                     name="telefonoEmergencia"
                     placeholder="ej: 87654321">
            </div>

            <div class="field field-wide">
              <label class="label">Dirección</label>
              <input class="control"
                     [(ngModel)]="form.direccion"
                     name="direccion"
                     placeholder="ej: Zona 1, Ciudad de Guatemala">
            </div>

          </div>

          <div class="footer">

            <button class="btn-primary"
                    type="button"
                    (click)="register()">
              Registrar
            </button>

            <button class="btn-secondary"
                    type="button"
                    (click)="cancelar()">
              Cancelar
            </button>

          </div>

        </form>

      </div>
    </div>

  </div>
</div>
