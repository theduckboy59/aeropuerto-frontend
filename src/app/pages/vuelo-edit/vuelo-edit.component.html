<div class="page-root">
  <main class="content">

    <header class="topbar" aria-label="Encabezado">
      <div class="topbar-left">
        <div class="badge">A L P</div>

        <div>
          <h1 class="title">Editar vuelo</h1>
          <p class="subtitle">
            Actualiza la programación del vuelo. El estado no se edita desde esta pantalla.
          </p>
        </div>
      </div>

      <div class="topbar-right">
        <button
          class="btn-secondary"
          type="button"
          (click)="regresar()">

          Regresar
        </button>
      </div>
    </header>

    <section class="card" aria-label="Formulario">
      <div class="section">
        <h2 class="section-title">Datos del vuelo</h2>

        <p class="muted" *ngIf="cargando">
          Cargando vuelo...
        </p>

        <p class="muted" *ngIf="cargandoDestinos">
          Cargando destinos autorizados...
        </p>

        <div class="form-grid" *ngIf="!cargando">

          <div class="field field-wide">
            <label class="label">Código de vuelo</label>

            <input
              class="control"
              [value]="codigoVuelo || '-'"
              disabled
            />
          </div>

          <div class="field field-wide">
            <label class="label">Aerolínea *</label>

            <select
              class="control"
              [(ngModel)]="form.aerolineaId"
              name="aerolineaId"
              (change)="onAerolineaChange()">

              <option value="">Seleccione</option>

              <option
                *ngFor="let a of aerolineas"
                [value]="a.id">

                {{ a.nombre || a.descripcion || a.label || a.id }}
              </option>
            </select>
          </div>

          <div class="field field-wide" *ngIf="form.aerolineaId && !cargandoDestinos && !aeropuertosAutorizados.length">
            <p class="muted">
              No se encontraron aeropuertos autorizados para la aerolínea seleccionada.
            </p>
          </div>

          <div class="field">
            <label class="label">Aeropuerto salida *</label>

            <select
              class="control"
              [(ngModel)]="form.aeropuertoSalidaId"
              name="aeropuertoSalidaId"
              [disabled]="!form.aerolineaId || cargandoDestinos || !aeropuertosAutorizados.length">

              <option value="">Seleccione</option>

              <option
                *ngFor="let a of aeropuertosAutorizados"
                [value]="a.id">

                {{ getAeropuertoLabel(a) }}
              </option>
            </select>
          </div>

          <div class="field">
            <label class="label">Fecha salida *</label>

            <input
              class="control"
              type="date"
              [(ngModel)]="form.fechaSalida"
              name="fechaSalida"
            />
          </div>

          <div class="field">
            <label class="label">Hora salida *</label>

            <input
              class="control"
              type="time"
              [(ngModel)]="form.horaSalida"
              name="horaSalida"
            />
          </div>

          <div class="field">
            <label class="label">Aeropuerto llegada *</label>

            <select
              class="control"
              [(ngModel)]="form.aeropuertoLlegadaId"
              name="aeropuertoLlegadaId"
              [disabled]="!form.aerolineaId || cargandoDestinos || !aeropuertosAutorizados.length">

              <option value="">Seleccione</option>

              <option
                *ngFor="let a of aeropuertosAutorizados"
                [value]="a.id">

                {{ getAeropuertoLabel(a) }}
              </option>
            </select>
          </div>

          <div class="field">
            <label class="label">Fecha llegada *</label>

            <input
              class="control"
              type="date"
              [(ngModel)]="form.fechaLlegada"
              name="fechaLlegada"
            />
          </div>

          <div class="field">
            <label class="label">Hora llegada *</label>

            <input
              class="control"
              type="time"
              [(ngModel)]="form.horaLlegada"
              name="horaLlegada"
            />
          </div>
        </div>

        <div class="form-actions">
          <button
            class="btn-primary"
            type="button"
            (click)="guardar()"
            [disabled]="guardando || cargando || cargandoDestinos">

            {{ guardando ? 'Guardando...' : 'Guardar cambios' }}
          </button>

          <button
            class="btn-secondary"
            type="button"
            (click)="regresar()">

            Cancelar
          </button>
        </div>
      </div>
    </section>

  </main>
</div>
