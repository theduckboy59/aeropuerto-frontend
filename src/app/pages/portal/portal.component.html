<div class="portal-root">
  <nav class="top-actions" aria-label="Acciones de acceso">
    <button class="top-action" type="button" routerLink="/login">Iniciar sesion</button>
    <button class="top-action" type="button" routerLink="/register">Registrarse</button>
    <button class="top-action top-action--ghost" type="button" routerLink="/consultas/vuelo">Consultar vuelo</button>
  </nav>

  <main class="page-layout">
    <section class="brand" aria-label="Portal principal">
      <div class="brand-badge" aria-label="Codigo del aeropuerto">ALP</div>
      <h1 class="brand-title">Aeropuerto Los Primos</h1>
      <p class="brand-subtitle">
        Centro digital de operaciones aeroportuarias, reservas y seguimiento de vuelos.
      </p>

      <div class="brand-actions" aria-label="Accesos principales">
        <a class="brand-action brand-action--primary" routerLink="/consultas/vuelo">Consultar vuelo</a>
        <a class="brand-action" routerLink="/login">Entrar al sistema</a>
      </div>

      <div class="info-strip" role="note" aria-label="Informacion del portal">
        <div class="info-item">
          <span class="info-kicker">Terminal</span>
          <span class="info-value">Portal de gestion</span>
        </div>
        <div class="info-divider" aria-hidden="true"></div>
        <div class="info-item">
          <span class="info-kicker">Estado</span>
          <span class="info-value">Operativo</span>
        </div>
        <div class="info-divider" aria-hidden="true"></div>
        <div class="info-item">
          <span class="info-kicker">Acceso</span>
          <span class="info-value">Seguro</span>
        </div>
      </div>

      <section class="media" aria-label="Galeria del aeropuerto">
        <div class="media-grid">
          <figure class="media-tile media-tile--wide">
            <img class="media-img" src="assets/portal/photos/terminal.jpg" alt="Terminal de aeropuerto" loading="lazy" />
            <figcaption class="media-caption">Terminal</figcaption>
          </figure>
          <figure class="media-tile">
            <img class="media-img" src="assets/portal/photos/concourse.jpg" alt="Concourse del aeropuerto" loading="lazy" />
            <figcaption class="media-caption">Puertas</figcaption>
          </figure>
          <figure class="media-tile">
            <img class="media-img" src="assets/portal/photos/wing.jpg" alt="Ala de avion al atardecer" loading="lazy" />
            <figcaption class="media-caption">Embarque</figcaption>
          </figure>
        </div>
      </section>
    </section>
  </main>
</div>
